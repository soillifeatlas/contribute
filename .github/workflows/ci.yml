name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  site:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: site } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -e .[dev]
      - run: pytest -xvs
      - run: ruff check .
  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npx --yes ajv-cli@5 compile --spec=draft2020 --strict-types=false --validate-formats=false -s schemas/submission.schema.json
      - run: npx --yes ajv-cli@5 compile --spec=draft2020 --strict-types=false --validate-formats=false -s schemas/sop-frontmatter.schema.json

  e2e:
    runs-on: ubuntu-latest
    needs: [site, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install backend
        working-directory: backend
        run: pip install -e .
      - name: Start backend
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8010 > /tmp/backend.log 2>&1 &
          sleep 3
          curl -fsS http://127.0.0.1:8010/api/v1/health
      - name: Install site deps
        working-directory: site
        run: npm ci
      - name: Install Playwright browsers
        working-directory: site
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        working-directory: site
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: site/playwright-report/
          retention-days: 7
