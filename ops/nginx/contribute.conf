# Include this from the main soillifeatlas.org server block:
#   include /etc/nginx/snippets/contribute.conf;

location /contribute/ {
    alias /srv/soillifeatlas/contribute/current/site/dist/contribute/;
    try_files $uri $uri/ $uri/index.html =404;
    add_header Cache-Control "public, max-age=300";
}

location /contribute/api/ {
    rewrite ^/contribute/api/(.*) /api/$1 break;
    proxy_pass http://unix:/run/contribute-backend.sock;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
