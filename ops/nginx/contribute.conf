# Included from the main soillifeatlas.org server block:
#   include /etc/nginx/snippets/contribute.conf;
#
# ^~ forces prefix priority over regex locations in the parent server block,
# so CSS / JS / HTML / SVG assets under /contribute/ are not intercepted by
# generic `location ~* \.(...)$` blocks elsewhere in the server.
#
# The alias points at site/dist/ directly because Astro's `base: '/contribute'`
# does not emit a nested `dist/contribute/` subfolder — the tree is flat and
# the URL prefix is stripped by nginx's alias directive.

location ^~ /contribute/api/ {
    rewrite ^/contribute/api/(.*) /api/$1 break;
    proxy_pass http://unix:/run/contribute-backend/backend.sock;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /contribute/ {
    alias /srv/soillifeatlas/contribute/current/site/dist/;
    try_files $uri $uri/ $uri/index.html =404;
    add_header Cache-Control "public, max-age=300";
}
